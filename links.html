<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>zurg3's profiles and social networks</title>
    <script src="https://cdn.jsdelivr.net/gh/zurg3/my-stuff@master/js/lib.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      html {
        scrollbar-color: black peru;
      }

      body {
        background: peru;
        color: white;
        font-family: 'Consolas', monospace;
        display: flex;
        justify-content: center;
        padding-top: 50px;
      }

      .container {
        width: 100%;
        max-width: 600px;
        text-align: center;
        padding: 20px;
      }

      .avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        margin: 0 auto 15px;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 5px;
      }

      p {
        color: white;
        margin-bottom: 30px;
      }

      .link_card {
        display: block;
        background: white;
        color: black;
        text-decoration: none;
        padding: 20px;
        margin-bottom: 15px;
        border-radius: 32px;
        font-family: sans-serif;
        line-height: 1.5;
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }

      @media screen and (orientation: portrait) {
        .link_card {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div><img class="avatar" src="https://pp.userapi.com/c604723/v604723423/21620/G8PuQQmidNg.jpg"></div>
        <h1>@zurg3</h1>
        <p>Stepan Skryabin</p>
      </header>
      <main id="links_container"></main>
    </div>
    <script>
      const {parse_data} = lib;

      const json_url = 'https://gist.githubusercontent.com/zurg3/1b8566a049b39037096f863a62f0c40a/raw/links.json';

      parse_data(json_url, 'json').then(links => {
        const links_container = document.getElementById('links_container');
        const fragment = document.createDocumentFragment();

        for (let i = 0; i < links.length; i++) {
          const link = document.createElement('a');

          link.className = 'link_card';
          link.href = links[i].url;
          link.target = '_blank';
          link.innerText = links[i].name;

          fragment.append(link);
        }

        links_container.append(fragment);
      });
    </script>
  </body>
</html>
